# Nginx site for the Attendance app.
#
# Serves the static React build and reverse-proxies the API + admin + realtime
# to PocketBase on 127.0.0.1:8090. TLS is required — the PWA's geolocation and
# camera APIs only work over HTTPS. Use certbot to fill in the cert paths
# (certbot --nginx will edit this file for you), or terminate TLS at an ALB.
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/attendance
#   sudo ln -s /etc/nginx/sites-available/attendance /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name attendance.example.com;

    # Let certbot serve the ACME challenge, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name attendance.example.com;

    # Managed by certbot (placeholders):
    ssl_certificate     /etc/letsencrypt/live/attendance.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attendance.example.com/privkey.pem;

    # Static React build output (frontend/dist copied here).
    root /var/www/attendance;
    index index.html;

    client_max_body_size 8m;  # room for selfie uploads

    # --- PocketBase: REST API, admin dashboard, file storage, realtime ---
    # The device ADMS push (/iclock/...) and bridge route (/api/bridge/...) are
    # under /api and /iclock, both proxied below.
    location ~ ^/(api|_)/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Realtime (SSE) needs buffering off + long timeouts.
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # ADMS receiver for the biometric device (plaintext iclock protocol).
    location /iclock/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA: serve static files, fall back to index.html for client routes ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
